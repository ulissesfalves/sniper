gaps:
  - id: GAP-DSR-001
    title: Honest DSR remains zero
    type: quantitative_merit
    severity: critical
    status: open
    evidence:
      - "reports/gates/phase6_research_baseline_rehydration_clean_regeneration_gate/phase4_artifact_integrity_report.json"
      - "dsr_honest=0.0"
      - "dsr_passed=false"
    source_files:
      - "data/models/phase4/phase4_report_v4.json"
      - "data/models/phase4/phase4_gate_diagnostic.json"
    allowed_actions:
      - "START_RESEARCH_ONLY_THESIS"
      - "FREEZE_LINE"
    forbidden_actions:
      - "PROMOTE_OFFICIAL"
      - "RELAX_DSR_THRESHOLD"
      - "DECLARE_READINESS"
    suggested_gate: "phase5_research_only_stage_a_nonzero_exposure_falsification_gate"
    stop_condition_if_unresolved: "No promotion or readiness claim is allowed while honest DSR remains 0.0."

  - id: GAP-CVAR-001
    title: Official CVaR has zero exposure
    type: economic_robustness
    severity: critical
    status: open
    evidence:
      - "reports/gates/phase6_research_baseline_rehydration_clean_regeneration_gate/portfolio_cvar_report.json"
      - "positions={}"
      - "total_exposure_pct=0.0"
      - "economic_robustness_status=NOT_PROVEN_ZERO_EXPOSURE"
    source_files:
      - "data/models/phase4/phase4_execution_snapshot.parquet"
    allowed_actions:
      - "START_RESEARCH_ONLY_THESIS"
      - "RUN_GLOBAL_REAUDIT"
    forbidden_actions:
      - "TREAT_ZERO_EXPOSURE_CVAR_AS_ECONOMIC_ROBUSTNESS"
      - "DECLARE_PAPER_READINESS"
    suggested_gate: "phase5_research_only_stage_a_nonzero_exposure_falsification_gate"
    stop_condition_if_unresolved: "Paper readiness is forbidden unless nonzero exposure or approved stress evidence exists."

  - id: GAP-XSEC-001
    title: Cross-sectional family is alive but not promotable
    type: promotability
    severity: critical
    status: open
    evidence:
      - "reports/audits/global_spec_adherence/global_spec_adherence_summary.json"
      - "ALIVE_BUT_NOT_PROMOTABLE"
    source_files:
      - "docs/SNIPER_openclaw_handoff.md"
      - "reports/gates/phase5_cross_sectional_sovereign_hardening_recheck/gate_report.json"
    allowed_actions:
      - "START_RESEARCH_ONLY_THESIS"
      - "FREEZE_LINE"
    forbidden_actions:
      - "PROMOTE_OFFICIAL"
      - "TREAT_RESEARCH_AS_OFFICIAL"
    suggested_gate: "phase5_research_only_stage_a_nonzero_exposure_falsification_gate"
    stop_condition_if_unresolved: "Do not promote cross-sectional while this status remains."

  - id: GAP-PAPER-001
    title: Paper readiness remains blocked
    type: phase_readiness
    severity: critical
    status: open
    evidence:
      - "DSR and CVaR blockers remain."
      - "PR #1 is draft governance/reproducibility evidence only."
    source_files:
      - "reports/audits/autonomous_stop_review/draft_pr_summary.md"
      - "reports/gates/phase6_pr_review_global_adherence_gate/gate_report.json"
    allowed_actions:
      - "RUN_GLOBAL_REAUDIT"
      - "STOP_FOR_HUMAN_DECISION"
    forbidden_actions:
      - "DECLARE_PAPER_READINESS"
      - "OPERATE_CAPITAL"
      - "CREATE_CREDENTIALS"
    suggested_gate: "none_until_quant_blockers_clear"
    stop_condition_if_unresolved: "Do not start Phase7 readiness from zero DSR and zero exposure."

  - id: GAP-MEM-001
    title: Persistent operating memory was absent
    type: governance_state
    severity: high
    status: resolved
    evidence:
      - "phase6_operating_memory_bootstrap_gate created AGENTS.md, contract and reports/state files."
    source_files:
      - "AGENTS.md"
      - "docs/SNIPER_AUTONOMOUS_OPERATING_CONTRACT.md"
      - "reports/state/sniper_current_state.json"
    allowed_actions:
      - "START_RESEARCH_ONLY_THESIS"
      - "RUN_GLOBAL_REAUDIT"
    forbidden_actions:
      - "IGNORE_REPORTS_STATE"
    suggested_gate: "phase6_operating_memory_bootstrap_gate"
    stop_condition_if_unresolved: "No autonomous mission should proceed without state files."
