# =============================================================================
# DESTINO: infra/nginx/nginx.conf
# Função: Proxy reverso — distribui o tráfego externo entre os serviços internos
#         /api/*  → FastAPI (sniper_api:8000)
#         /ws     → FastAPI WebSocket (sniper_api:8000)
#         /*      → React SPA (sniper_frontend:80)
# Este arquivo é montado como volume no container nginx (não copiado no build)
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 75s;
    server_tokens   off;

    # Rate limiting: máx 30 req/s por IP nas rotas de API
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Upstream: FastAPI backend
    upstream fastapi_backend {
        server sniper_api:8000;
        keepalive 32;
    }

    # Upstream: React SPA (Nginx interno do container frontend)
    upstream react_frontend {
        server sniper_frontend:80;
    }

    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 10M;

        # ── Rotas da API REST ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 300s;
        }

        # ── WebSocket (sinais em tempo real + alertas de drift) ───────────
        location /ws {
            proxy_pass          http://fastapi_backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── Frontend React SPA ────────────────────────────────────────────
        location / {
            proxy_pass         http://react_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
    }
}
