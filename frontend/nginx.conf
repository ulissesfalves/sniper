# =============================================================================
# DESTINO: frontend/nginx.conf
# Função: Serve os arquivos estáticos do React (SPA)
#         Qualquer rota desconhecida retorna index.html (client-side routing)
# Este arquivo é COPIADO para dentro do container frontend durante o build
# =============================================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para JS/CSS (reduz ~70% no tamanho do bundle)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript application/wasm;

    # Assets com hash no nome (gerados pelo Vite): cache agressivo de 1 ano
    location ~* \.(js|css|woff2?|png|svg|ico|webp|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Todas as rotas da SPA caem aqui → retorna index.html
    # Necessário para React Router funcionar com refresh de página
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
